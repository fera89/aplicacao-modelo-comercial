<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AppINP - Login Admin</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        body {
            justify-content: center;
            align-items: center;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            text-align: center;
        }

        .auth-brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .brand-icon {
            width: 48px;
            height: 48px;
            background: var(--primary);
            border-radius: 12px;
            display: grid;
            place-items: center;
        }

        .auth-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
            text-align: left;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .input-group input {
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: var(--primary);
        }

        .btn-primary {
            margin-top: 8px;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .auth-error {
            color: #ef4444;
            font-size: 0.875rem;
            display: none;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="auth-container glass-panel">
        <div class="auth-brand">
            <div class="brand-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                </svg>
            </div>
            <div>
                <h1 class="auth-title">Painel Admin</h1>
                <p class="auth-subtitle">Entre com suas credenciais de gestão</p>
            </div>
        </div>

        <form class="auth-form" id="loginForm">
            <div class="input-group">
                <label for="email">E-mail Administrativo</label>
                <input type="email" id="email" required placeholder="admin@appinp.com">
            </div>
            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <div class="auth-error" id="errorMessage">Usuário ou senha incorretos.</div>
            <button type="submit" class="btn-primary" id="loginBtn">Acessar Painel</button>
        </form>
    </div>
    <script type="module" src="/src/login.js"></script>
</body>

</html>
